<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Members</title>
    <style>
    html, body {
  height: 100%;
  margin: 0;
}

body{
  font-family: system-ui, -apple-system, "Noto Sans TC", sans-serif;
  background: linear-gradient(180deg, #eaf4ff 0%, #ffffff 100%);
  background-attachment: fixed; /* ⭐避免捲動時出現接縫 */
  color: #111;
}
    .wrap { max-width: 980px; margin: 0 auto; padding: 24px 18px 60px; }

    .top{
      display:flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 30px;
      padding-bottom: 10px;
    }
    .top h1{ margin:0; font-size: 30px; font-weight: 700; }
    .top a{ color:#111; font-size: 20px; text-decoration:none; }
    .top a:hover{ text-decoration: underline; }

    .list{
      margin-top: 40px;
      display:flex;
      flex-direction: column;
      position: relative;
      left: 100px;
      gap: 14px;
    }
    .member{
      font-size: 30px;
      letter-spacing: .2px;
      line-height: 1.8;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <h1>成員介紹(Members)</h1>
      <a class="home" href="https://faculty.ndhu.edu.tw/~ndhueevip/">回首頁</a>
    </div>

    <div id="members" class="list"></div>
    <div id="empty" class="empty" style="display:none;"></div>
</div>

  <script>
    const members = [
      { name: "吳浩瑋"},
      { name: "翁鉦鈞"},
      { name: "宋旻叡"},
      { name: "周家樂"},
      { name: "謝米恩"},
      { name: "李逸凡"},
      { name: "葉佳宜"},
      { name: "陳禹丞"},
      { name: "陳宗甫"},
      { name: "劉震緯"},
      { name: "洪御翔"},
      { name: "周瑾芸"},
      { name: "廖士緯"},
      { name: "郭彧晢"},
    ];

    function initials(name) {
      return (name || "?").trim().slice(0, 1);
    }

    function renderMembers(list) {
      const box = document.getElementById("members");
      const empty = document.getElementById("empty");

      box.innerHTML = "";

      if (!list || list.length === 0) {
        empty.style.display = "block";
        return;
      }
      empty.style.display = "none";

      for (const m of list) {
        const line = document.createElement("div");
        line.className = "member";
        line.textContent = m.name || "未命名";
        box.appendChild(line);
      }
    }

    renderMembers(members);
</script>
</body>
</html>
